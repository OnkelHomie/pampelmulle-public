name: 🐛 Bug-Report
description: Einen Fehler im Bot melden
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Danke, dass du dir die Zeit nimmst einen Bug zu melden!

        **Schneller geht's direkt im Discord:**
        - Schreib im Bug-Kanal: `Bugreport: [dein Problem]` → wird automatisch als Issue erstellt
        - Oder nutze den Slash-Command: `/bugreport kategorie:Bug titel:... beschreibung:...`
        - Discord: [discord.gg/szBd7ZD5Bq](https://discord.gg/szBd7ZD5Bq)

  - type: dropdown
    id: category
    attributes:
      label: Bereich
      options:
        - Economy (Coins, Staking, Kredit)
        - Spiele (Blackjack, Slot, Crash, Plinko, High-Low, etc.)
        - Lotterie / Community-Pott
        - Level-System / XP / Voice-XP
        - Moderation (Warn, Ban, Mute, Tempban)
        - AutoMod / Anti-Spam
        - Willkommen-System / Reaction Roles
        - Web-Dashboard
        - Sonstiges
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Betroffener Command
      placeholder: "z.B. !stake, /ban oder !blackjack"
    validations:
      required: false

  - type: textarea
    id: what-happened
    attributes:
      label: Was ist passiert?
      placeholder: Beschreibe was du gemacht hast und was schiefgelaufen ist.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Was hast du erwartet?
      placeholder: Was hätte passieren sollen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Schritte zur Reproduktion
      placeholder: |
        1. Schreibe '!stake 1000'
        2. Bot antwortet mit ...
        3. Fehler tritt auf
    validations:
      required: false

  - type: input
    id: discord_tag
    attributes:
      label: Discord-Name (optional)
      placeholder: "z.B. MaxMustermann oder deine User-ID"
    validations:
      required: false
